# nginx.conf — served inside the frontend container
# Proxies /api requests to the backend service (docker-compose name: backend)

server {
    listen       80;
    server_name  _;

    # Serve Vite static build
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback — all unknown routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api → FastAPI backend container
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;

        # Required for SSE (Server-Sent Events) streaming
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;
    }

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
